name: wuarike
description: "Wuarike — Lima Food Discovery Platform"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.3

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # DI
  get_it: ^8.0.2

  # HTTP
  dio: ^5.7.0

  # Secure storage (tokens)
  flutter_secure_storage: ^10.0.0

  # Maps
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # Geolocation
  geolocator: ^13.0.4
  geocoding: ^3.0.0

  # Images
  image_picker: ^1.1.2
  cached_network_image: ^3.4.1

  # Video
  video_player: ^2.9.5
  chewie: ^1.8.5
  camera: ^0.11.0+2
  video_compress: ^3.1.3

  # Offline / cache
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Fonts
  google_fonts: ^8.0.2

  # Utils
  equatable: ^2.0.5
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  intl: ^0.19.0
  url_launcher: ^6.3.0
  share_plus: ^10.1.4
  google_sign_in: ^6.2.2
  sign_in_with_apple: ^6.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.12
  freezed: ^2.5.8
  json_serializable: ^6.8.0
  riverpod_generator: ^2.6.4

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/

dependency_overrides:
  path_provider_android: 2.2.15
